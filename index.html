<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 幸運日記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #C9952A;
    --gold-light: #FFF3D6;
    --gold-mid: #E9A840;
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.16);
    --text-primary: #1A1A18;
    --text-secondary: #6B6B60;
    --text-muted: #A8A89A;
    --radius-md: 10px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', 'Noto Serif TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #loginScreen::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,149,42,0.07) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }

  #loginScreen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,149,42,0.05) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  .login-inner {
    text-align: center;
    max-width: 360px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .login-symbol {
    font-size: 48px;
    margin-bottom: 1.5rem;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .login-title {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 0.2em;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .login-sub {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 2.5rem;
    letter-spacing: 0.03em;
  }

  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 24px;
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-md);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    letter-spacing: 0.03em;
  }

  .google-btn:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  .google-btn svg { flex-shrink: 0; }

  /* ── APP SCREEN ── */
  #appScreen { display: none; min-height: 100vh; }

  /* ── HEADER ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-logo {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: var(--text-primary);
  }

  .app-logo span { color: var(--gold); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--gold-light);
    object-fit: cover;
    cursor: pointer;
  }

  .user-avatar-placeholder {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--gold-light);
    border: 2px solid var(--gold-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
    color: var(--gold);
    cursor: pointer;
  }

  .logout-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .logout-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }

  /* ── MAIN CONTENT ── */
  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }

  .stat-num {
    font-size: 26px;
    font-weight: 500;
    color: var(--text-primary);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* ── STREAK DOTS ── */
  .streak-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .streak-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .streak-dots { display: flex; gap: 6px; flex: 1; }

  .s-dot {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    transition: background 0.3s;
    position: relative;
  }

  .s-dot.active { background: var(--gold-mid); }

  .streak-days {
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
    white-space: nowrap;
  }

  /* ── INPUT CARD ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .input-card:focus-within {
    box-shadow: var(--shadow-md);
    border-color: rgba(201,149,42,0.3);
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    display: block;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 1.85;
    color: var(--text-primary);
    resize: none;
    min-height: 88px;
  }

  textarea::placeholder { color: var(--text-muted); font-weight: 300; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .mood-row { display: flex; gap: 6px; }

  .mood-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .mood-btn:hover { background: var(--gold-light); border-color: var(--gold-mid); }
  .mood-btn.selected { background: var(--gold-light); border-color: var(--gold-mid); transform: scale(1.12); }

  .submit-btn {
    background: var(--text-primary);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-md);
    padding: 9px 22px;
    font-size: 13px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.75; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── FILTER ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .filter-chip {
    font-size: 12px;
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .filter-chip.active, .filter-chip:hover {
    background: var(--text-primary);
    color: var(--bg);
    border-color: var(--text-primary);
  }

  /* ── ENTRIES ── */
  .entries { display: flex; flex-direction: column; gap: 10px; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
    position: relative;
    animation: slideIn 0.3s ease;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-hover); }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .entry-date { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }
  .entry-mood { font-size: 16px; }

  .entry-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 14.5px;
    line-height: 1.85;
    color: var(--text-primary);
    font-weight: 300;
  }

  .entry-tag {
    display: inline-block;
    margin-top: 0.6rem;
    font-size: 11px;
    color: var(--gold);
    background: var(--gold-light);
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .entry-delete {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 3px 8px;
    border-radius: 6px;
    line-height: 1;
  }

  .entry-card:hover .entry-delete { opacity: 1; }
  .entry-delete:hover { background: #FFF0F0; color: #c0392b; }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 2.2;
  }

  .empty-state .big { font-size: 32px; display: block; margin-bottom: 0.5rem; }

  /* ── LOADING ── */
  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-primary);
    color: var(--bg);
    padding: 11px 24px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 999;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SETUP BANNER ── */
  .setup-banner {
    background: linear-gradient(135deg, #FFF8E6 0%, #FFF3D6 100%);
    border: 1px solid rgba(201,149,42,0.3);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 2rem;
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--text-primary);
  }

  .setup-banner h3 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .setup-banner code {
    background: rgba(255,255,255,0.7);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12.5px;
    color: #8B5E0A;
  }

  .setup-banner ol { padding-left: 1.2rem; }
  .setup-banner li { margin-bottom: 0.4rem; }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .mood-row { gap: 4px; }
    .mood-btn { width: 30px; height: 30px; font-size: 14px; }
    .main { padding: 1.25rem 1rem 3rem; }
  }
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div id="loginScreen">
  <div class="login-inner">
    <div class="login-symbol">✦</div>
    <h1 class="login-title">幸運日記</h1>
    <p class="login-sub">
      記下每一個小確幸<br>
      當你相信自己是幸運的<br>
      幸運就會越來越多
    </p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="appScreen">
  <header class="app-header">
    <div class="app-logo">✦ <span>幸運</span>日記</div>
    <div class="header-right">
      <div id="userAvatar"></div>
      <button class="logout-btn" onclick="signOut()">登出</button>
    </div>
  </header>

  <main class="main">

    <!-- Setup Banner (shown only when not configured) -->
    <div id="setupBanner" class="setup-banner" style="display:none">
      <h3>⚙️ 請先完成 Firebase 設定</h3>
      請將檔案頂部 <code>firebaseConfig</code> 的值替換成你的 Firebase 專案設定。<br>
      詳細步驟請參考下方說明。
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">—</span>
        <span class="stat-lbl">總幸運數</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statStreak">—</span>
        <span class="stat-lbl">連續天數</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statMonth">—</span>
        <span class="stat-lbl">本月幸運</span>
      </div>
    </div>

    <!-- Streak -->
    <div class="streak-section">
      <span class="streak-label">最近 14 天</span>
      <div class="streak-dots" id="streakDots"></div>
      <span class="streak-days" id="streakDaysText">0 天</span>
    </div>

    <!-- Input -->
    <div class="input-card">
      <span class="input-label">今天有什麼小幸運？</span>
      <textarea id="luckyInput"
        placeholder="例如：出門剛好沒下雨、捷運一來就有座位、朋友突然傳來一句加油…"
        rows="3"></textarea>
      <div class="input-footer">
        <div class="mood-row" id="moodRow">
          <button class="mood-btn selected" data-mood="✨">✨</button>
          <button class="mood-btn" data-mood="🌸">🌸</button>
          <button class="mood-btn" data-mood="🌟">🌟</button>
          <button class="mood-btn" data-mood="☀️">☀️</button>
          <button class="mood-btn" data-mood="🍀">🍀</button>
          <button class="mood-btn" data-mood="💛">💛</button>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="addEntry()">記下來 →</button>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-chip" onclick="setFilter('today',this)">今天</button>
      <button class="filter-chip" onclick="setFilter('week',this)">本週</button>
      <button class="filter-chip" onclick="setFilter('month',this)">本月</button>
    </div>

    <!-- Entries -->
    <div id="entriesContainer">
      <div class="loading-state">
        <div class="spinner"></div>
        載入幸運中…
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════ FIREBASE SDK ══════════════ -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════════════════════
// 🔧 步驟一：將下方的值替換成你的 Firebase 專案設定
//    Firebase Console → 專案設定 → 你的應用程式 → firebaseConfig
// ══════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCuLZNKe6QQjLFP-1tuXBXOXkBrw3b-gvE",
  authDomain: "lucky-journal.firebaseapp.com",
  projectId: "lucky-journal",
  storageBucket: "lucky-journal.firebasestorage.app",
  messagingSenderId: "579071486789",
  appId: "1:579071486789:web:1538a2f9f111fabb9e6c2c",
  measurementId: "G-NCSTXKXTJ5"
};
// ══════════════════════════════════════════════════════════════

const IS_CONFIGURED = firebaseConfig.apiKey !== "YOUR_API_KEY";

let app, auth, db, currentUser = null;
let entries = [];
let currentFilter = 'all';
let selectedMood = '✨';
let unsubscribe = null;

// ── Init ──
if (IS_CONFIGURED) {
  app  = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db   = getFirestore(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      showApp(user);
      listenEntries();
    } else {
      currentUser = null;
      showLogin();
    }
  });
} else {
  // Show app with setup banner
  showApp({ displayName: '請先設定 Firebase', photoURL: null, email: '' });
  document.getElementById('setupBanner').style.display = 'block';
  renderEntries([]);
  updateStats([]);
  renderStreak([]);
}

// ── Auth ──
window.signInWithGoogle = async () => {
  if (!IS_CONFIGURED) { showToast('請先填入 Firebase 設定'); return; }
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { showToast('登入失敗，請再試一次'); console.error(e); }
};

window.signOut = async () => {
  if (unsubscribe) unsubscribe();
  await fbSignOut(auth);
};

// ── UI show/hide ──
function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  const avatarEl = document.getElementById('userAvatar');
  if (user.photoURL) {
    avatarEl.innerHTML = `<img class="user-avatar" src="${user.photoURL}" alt="avatar" title="${user.displayName || ''}">`;
  } else {
    const initials = (user.displayName || user.email || '?').charAt(0).toUpperCase();
    avatarEl.innerHTML = `<div class="user-avatar-placeholder">${initials}</div>`;
  }
}

// ── Firestore listener ──
function listenEntries() {
  if (!currentUser) return;
  const q = query(
    collection(db, 'users', currentUser.uid, 'entries'),
    orderBy('createdAt', 'desc')
  );
  unsubscribe = onSnapshot(q, snap => {
    entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderEntries(filterEntries());
    updateStats(entries);
    renderStreak(entries);
  }, err => {
    console.error(err);
    showToast('讀取失敗，請重新整理');
  });
}

// ── Add entry ──
window.addEntry = async () => {
  if (!IS_CONFIGURED) { showToast('請先設定 Firebase'); return; }
  const text = document.getElementById('luckyInput').value.trim();
  if (!text) { showToast('請寫下今天的小幸運 ✦'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  try {
    await addDoc(collection(db, 'users', currentUser.uid, 'entries'), {
      text,
      mood: selectedMood,
      createdAt: serverTimestamp()
    });
    document.getElementById('luckyInput').value = '';
    showToast('幸運已記下 ✦');
  } catch(e) {
    console.error(e);
    showToast('儲存失敗，請再試一次');
  } finally {
    btn.disabled = false;
  }
};

// ── Delete entry ──
window.deleteEntry = async (id) => {
  if (!currentUser) return;
  try {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'entries', id));
    showToast('已刪除');
  } catch(e) { showToast('刪除失敗'); }
};

// ── Filter ──
window.setFilter = (f, el) => {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderEntries(filterEntries());
};

function filterEntries() {
  const now = new Date();
  return entries.filter(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date(e.createdAt || Date.now());
    if (currentFilter === 'today') return d.toDateString() === now.toDateString();
    if (currentFilter === 'week') return (now - d) / 86400000 < 7;
    if (currentFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

// ── Render entries ──
function renderEntries(list) {
  const el = document.getElementById('entriesContainer');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <span class="big">✦</span>
      還沒有幸運紀錄<br>
      寫下你的第一個小確幸吧
    </div>`;
    return;
  }
  el.innerHTML = list.map(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}　${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const safe = e.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    return `
    <div class="entry-card">
      <button class="entry-delete" onclick="deleteEntry('${e.id}')">✕</button>
      <div class="entry-header">
        <span class="entry-date">${dateStr}</span>
        <span class="entry-mood">${e.mood || '✨'}</span>
      </div>
      <div class="entry-text">${safe}</div>
      <span class="entry-tag">✦ 小幸運</span>
    </div>`;
  }).join('');
}

// ── Stats ──
function updateStats(list) {
  const now = new Date();
  const total = list.length;
  const month = list.filter(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  const days = new Set(list.map(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    return d.toDateString();
  }));
  let streak = 0;
  const cur = new Date();
  while (days.has(cur.toDateString())) {
    streak++;
    cur.setDate(cur.getDate() - 1);
  }

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statMonth').textContent = month;
  document.getElementById('statStreak').textContent = streak;
}

// ── Streak dots ──
function renderStreak(list) {
  const days = new Set(list.map(e => {
    const d = e.createdAt?.toDate ? e.createdAt.toDate() : new Date();
    return d.toDateString();
  }));
  const dotsEl = document.getElementById('streakDots');
  const dots = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    dots.push(`<div class="s-dot ${days.has(d.toDateString()) ? 'active' : ''}" title="${d.toLocaleDateString('zh-TW')}"></div>`);
  }
  dotsEl.innerHTML = dots.join('');

  // streak count
  let streak = 0;
  const cur = new Date();
  while (days.has(cur.toDateString())) {
    streak++;
    cur.setDate(cur.getDate() - 1);
  }
  document.getElementById('streakDaysText').textContent = `${streak} 天`;
}

// ── Mood selection ──
document.getElementById('moodRow').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = btn.dataset.mood;
});

// ── Cmd/Ctrl+Enter ──
document.getElementById('luckyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) window.addEntry();
});

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
window.showToast = showToast;

</script>
</body>
