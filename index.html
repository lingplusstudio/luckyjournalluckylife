<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ 幸運日記 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9952A;
            --gold-light: #FFF3D6;
            --gold-mid: #E9A840;
            --bg: #FAFAF7;
            --surface: #FFFFFF;
            --border: rgba(0,0,0,0.08);
            --border-hover: rgba(0,0,0,0.16);
            --text-primary: #1A1A18;
            --text-secondary: #6B6B60;
            --text-muted: #A8A89A;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Zen Kaku Gothic New', 'Noto Serif TC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── LOGIN SCREEN ── */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }

        .login-inner { text-align: center; max-width: 360px; width: 100%; position: relative; z-index: 1; }
        .login-symbol { font-size: 48px; margin-bottom: 1.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .login-title { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 32px; letter-spacing: 0.2em; margin-bottom: 0.5rem; }
        .login-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 2.5rem; }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px 24px;
            background: var(--surface); border: 1px solid var(--border-hover); border-radius: var(--radius-md);
            cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
        .google-btn:hover { box-shadow: var(--shadow-md); border-color: var(--gold); transform: translateY(-1px); }

        /* ── APP SCREEN ── */
        #appScreen { display: none; min-height: 100vh; }
        .app-header {
            background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .app-logo { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 18px; letter-spacing: 0.15em; }
        .app-logo span { color: var(--gold); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-avatar, .user-avatar-placeholder { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--gold-light); object-fit: cover; }
        .logout-btn { font-size: 12px; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; }

        .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

        /* ── STATS & STREAK ── */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; text-align: center; }
        .stat-num { font-size: 26px; font-weight: 500; display: block; margin-bottom: 4px; }
        .stat-lbl { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

        .streak-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .streak-dots { display: flex; gap: 6px; flex: 1; }
        .s-dot { flex: 1; height: 6px; border-radius: 3px; background: var(--border); }
        .s-dot.active { background: var(--gold-mid); }

        /* ── INPUT CARD ── */
        .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm); }
        .input-label { font-size: 11px; color: var(--text-muted); margin-bottom: 0.6rem; display: block; }
        textarea { width: 100%; border: none; outline: none; background: transparent; font-family: 'Noto Serif TC', serif; font-size: 15px; line-height: 1.85; resize: none; min-height: 88px; }
        
        .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
        
        /* Star Rating */
        .star-rating { display: flex; gap: 4px; }
        .star-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--border-hover); transition: color 0.2s; }
        .star-btn.active { color: var(--gold-mid); }
        .submit-btn { background: var(--text-primary); color: var(--bg); border: none; border-radius: var(--radius-md); padding: 9px 22px; font-size: 13px; cursor: pointer; }

        /* ── FILTER ── */
        .filter-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
        .filter-chip { font-size: 12px; padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; cursor: pointer; }
        .filter-chip.active { background: var(--text-primary); color: var(--bg); }

        /* ── ENTRIES ── */
        .entry-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; 
            position: relative; transition: all 0.2s; cursor: pointer; margin-bottom: 10px;
        }
        .entry-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--gold-mid); }
        .entry-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .entry-date { font-size: 11px; color: var(--text-muted); }
        .entry-stars { color: var(--gold-mid); font-size: 12px; }
        .entry-text { font-family: 'Noto Serif TC', serif; font-size: 14.5px; line-height: 1.85; white-space: pre-wrap; }
        .entry-delete { position: absolute; top: 10px; right: 10px; border: none; background: none; color: var(--text-muted); padding: 5px; cursor: pointer; opacity: 0; }
        .entry-card:hover .entry-delete { opacity: 1; }

        /* ── MODAL ── */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content { 
            background: var(--surface); width: 90%; max-width: 500px; border-radius: var(--radius-lg); padding: 2rem;
            box-shadow: var(--shadow-md); position: relative;
        }
        .modal-close { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 20px; color: var(--text-muted); }

        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text-primary); color: var(--bg); padding: 11px 24px; border-radius: var(--radius-md); font-size: 13px; transition: transform 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-inner">
        <div class="login-symbol">✦</div>
        <h1 class="login-title">幸運日記</h1>
        <p class="login-sub">記下每一個小確幸<br>讓幸運持續發生</p>
        <button class="google-btn" onclick="signInWithGoogle()">使用 Google 帳號登入</button>
    </div>
</div>

<div id="appScreen">
    <header class="app-header">
        <div class="app-logo">✦ <span>幸運</span>日記</div>
        <div class="header-right">
            <div id="userAvatar"></div>
            <button class="logout-btn" onclick="signOut()">登出</button>
        </div>
    </header>

    <main class="main">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-num" id="statTotal">—</span><span class="stat-lbl">總幸運數</span></div>
            <div class="stat-card"><span class="stat-num" id="statStreak">—</span><span class="stat-lbl">連續天數</span></div>
            <div class="stat-card"><span class="stat-num" id="statMonth">—</span><span class="stat-lbl">本月幸運</span></div>
        </div>

        <div class="streak-section">
            <div class="streak-dots" id="streakDots"></div>
            <span class="streak-days" id="streakDaysText">0 天</span>
        </div>

        <div class="input-card">
            <span class="input-label">今天的小幸運是什麼？</span>
            <textarea id="luckyInput" placeholder="寫下值得感謝的一刻..." rows="3"></textarea>
            <div class="input-footer">
                <div class="star-rating" id="starInput">
                    <button class="star-btn active" data-val="1">⭐</button>
                    <button class="star-btn" data-val="2">⭐</button>
                    <button class="star-btn" data-val="3">⭐</button>
                    <button class="star-btn" data-val="4">⭐</button>
                    <button class="star-btn" data-val="5">⭐</button>
                </div>
                <button class="submit-btn" id="submitBtn" onclick="addEntry()">記下來 →</button>
            </div>
        </div>

        <div class="filter-row">
            <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
            <button class="filter-chip" onclick="setFilter('today',this)">今天</button>
            <button class="filter-chip" onclick="setFilter('month',this)">本月</button>
        </div>

        <div id="entriesContainer"></div>
    </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeEditModal()">✕</span>
        <h3 style="margin-bottom: 1rem; font-weight: 400;">編輯這份幸運</h3>
        <div class="star-rating" id="editStarInput" style="margin-bottom: 1rem;">
            <button class="star-btn" data-val="1">⭐</button>
            <button class="star-btn" data-val="2">⭐</button>
            <button class="star-btn" data-val="3">⭐</button>
            <button class="star-btn" data-val="4">⭐</button>
            <button class="star-btn" data-val="5">⭐</button>
        </div>
        <textarea id="editLuckyInput" style="border: 1px solid var(--border); padding: 10px; border-radius: 8px; min-height: 150px;"></textarea>
        <button class="submit-btn" style="width: 100%; margin-top: 1rem;" onclick="saveEdit()">儲存變更</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// 🔧 請填入你的 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCuLZNKe6QQjLFP-1tuXBXOXkBrw3b-gvE",
  authDomain: "lucky-journal.firebaseapp.com",
  projectId: "lucky-journal",
  storageBucket: "lucky-journal.firebasestorage.app",
  messagingSenderId: "579071486789",
  appId: "1:579071486789:web:1538a2f9f111fabb9e6c2c",
  measurementId: "G-NCSTXKXTJ5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allEntries = [];
let currentFilter = 'all';
let currentStars = 1;
let editingId = null;
let editStars = 1;

// ── Auth Logic ──
onAuthStateChanged(auth, user => {
    if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        updateAvatar(user);
        listenEntries();
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
    }
});

window.signInWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
window.signOut = () => fbSignOut(auth);

function updateAvatar(user) {
    const el = document.getElementById('userAvatar');
    if (user.photoURL) el.innerHTML = `<img class="user-avatar" src="${user.photoURL}">`;
    else el.innerHTML = `<div class="user-avatar-placeholder">${user.email[0]}</div>`;
}

// ── CRUD ──
function listenEntries() {
    const q = query(collection(db, 'users', currentUser.uid, 'entries'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snap => {
        allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    });
}

window.addEntry = async () => {
    const text = document.getElementById('luckyInput').value.trim();
    if (!text) return showToast('寫點什麼吧 ✨');
    await addDoc(collection(db, 'users', currentUser.uid, 'entries'), {
        text, stars: currentStars, createdAt: serverTimestamp()
    });
    document.getElementById('luckyInput').value = '';
    showToast('已記下幸運 ✦');
};

window.deleteEntry = async (e, id) => {
    e.stopPropagation();
    if (confirm('確定要刪除嗎？')) await deleteDoc(doc(db, 'users', currentUser.uid, 'entries', id));
};

// ── Edit Modal Logic ──
window.openEditModal = (id) => {
    const entry = allEntries.find(e => e.id === id);
    if (!entry) return;
    editingId = id;
    editStars = entry.stars || 1;
    document.getElementById('editLuckyInput').value = entry.text;
    updateStarUI('editStarInput', editStars);
    document.getElementById('editModal').style.display = 'flex';
};

window.closeEditModal = () => {
    document.getElementById('editModal').style.display = 'none';
    editingId = null;
};

window.saveEdit = async () => {
    const newText = document.getElementById('editLuckyInput').value.trim();
    if (!newText) return;
    await updateDoc(doc(db, 'users', currentUser.uid, 'entries', editingId), {
        text: newText,
        stars: editStars
    });
    closeEditModal();
    showToast('更新成功 ✦');
};

// ── Render ──
function render() {
    const filtered = allEntries.filter(e => {
        const d = e.createdAt?.toDate?.() || new Date();
        const now = new Date();
        if (currentFilter === 'today') return d.toDateString() === now.toDateString();
        if (currentFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        return true;
    });

    const container = document.getElementById('entriesContainer');
    if (!filtered.length) {
        container.innerHTML = `<div style="text-align:center; padding: 3rem; color: #A8A89A;">尚無幸運紀錄</div>`;
    } else {
        container.innerHTML = filtered.map(e => {
            const d = e.createdAt?.toDate?.() || new Date();
            // 改為 YYYY/MM/DD
            const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
            const starStr = '⭐'.repeat(e.stars || 1);
            return `
            <div class="entry-card" onclick="openEditModal('${e.id}')">
                <button class="entry-delete" onclick="deleteEntry(event, '${e.id}')">✕</button>
                <div class="entry-header">
                    <span class="entry-date">${dateStr}</span>
                    <span class="entry-stars">${starStr}</span>
                </div>
                <div class="entry-text">${e.text}</div>
            </div>`;
        }).join('');
    }
    updateStats();
}

function updateStats() {
    document.getElementById('statTotal').textContent = allEntries.length;
    // 簡單的天數計算
    const days = new Set(allEntries.map(e => (e.createdAt?.toDate?.() || new Date()).toDateString()));
    document.getElementById('statStreak').textContent = days.size;
    
    // Streak dots
    const dots = [];
    for(let i=13; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const active = days.has(d.toDateString()) ? 'active' : '';
        dots.push(`<div class="s-dot ${active}"></div>`);
    }
    document.getElementById('streakDots').innerHTML = dots.join('');
    document.getElementById('streakDaysText').textContent = `${days.size} 天`;
}

// ── Stars UI ──
function initStars(containerId, isEdit = false) {
    document.getElementById(containerId).addEventListener('click', e => {
        const btn = e.target.closest('.star-btn');
        if (!btn) return;
        const val = parseInt(btn.dataset.val);
        if (isEdit) editStars = val; else currentStars = val;
        updateStarUI(containerId, val);
    });
}

function updateStarUI(id, val) {
    const btns = document.querySelectorAll(`#${id} .star-btn`);
    btns.forEach(b => {
        if (parseInt(b.dataset.val) <= val) b.classList.add('active');
        else b.classList.remove('active');
    });
}

initStars('starInput');
initStars('editStarInput', true);

window.setFilter = (f, el) => {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
};

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
